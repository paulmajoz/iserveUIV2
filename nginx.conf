server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Cache static assets with proper MIME types
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Serve files and directories, or fall back to index.html for SPA routing
    location / {
        # Try to serve the request as a file/directory first
        # If not found AND not a file request, serve index.html for SPA routing
        try_files $uri $uri/ =404;
        # Catch 404 errors for SPA routing
        error_page 404 /index.html;
    }

    # Error page for SPA routing (internal redirect)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
